name: build

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Export env vars
        run: buildscripts/include/ci.sh export >>$GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}-arm64"
          enableCrossOsArchive: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip gperf nasm
          sudo pip3 install meson

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore $HOME/mpv-android.jks \
            -alias mpv \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass mpvandroid \
            -keypass mpvandroid \
            -dname "CN=mpv-android, OU=build, O=build, L=build, S=build, C=US"

      - name: Download deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      - name: Build
        run: |
          buildscripts/include/ci.sh build
        env:
          ARCH: arm64-v8a
          DONT_BUILD_RELEASE: "1"

      - name: Sign APKs
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          APKSIGNER=$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner
          find app/build/outputs/apk -name '*.apk' | while read apk; do
            signed="${apk%.apk}-signed.apk"
            "$APKSIGNER" sign \
              --ks $HOME/mpv-android.jks \
              --ks-key-alias mpv \
              --ks-pass pass:mpvandroid \
              --key-pass pass:mpvandroid \
              --out "$signed" \
              "$apk"
            echo "Signed: $signed"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: mpv-android-arm64-signed
          path: app/build/outputs/apk/**/*-signed.apk
          if-no-files-found: warn
